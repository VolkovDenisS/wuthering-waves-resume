<div #mainLayout class="w-full h-[100dvh] bg-ww-bg flex overflow-hidden relative font-sans text-ww-text">
  
  <!-- Background Layers -->
  <div class="absolute inset-0 ww-resonance-bg"></div>
  <div class="absolute inset-0 bg-gradient-to-r from-black via-black/70 to-transparent"></div>
  <div class="absolute inset-0 scanlines pointer-events-none opacity-50 z-50"></div>

  <!-- Decorative Corner Brackets -->
  <div class="absolute top-4 left-4 w-8 h-8 md:w-12 md:h-12 border-t-2 border-l-2 border-ww-border z-10 opacity-30 md:opacity-50"></div>
  <div class="absolute bottom-4 left-4 w-8 h-8 md:w-12 md:h-12 border-b-2 border-l-2 border-ww-border z-10 opacity-30 md:opacity-50"></div>

  <!-- Main Content Area (Left/Center) -->
  <main class="flex-1 relative z-10 h-full p-4 md:p-16 2xl:p-12 pl-6 md:pl-24 2xl:pl-20 overflow-y-auto overflow-x-hidden">
    <router-outlet></router-outlet>
  </main>

  <!-- Right Side Navigation (Resonator Menu Style) -->
  <nav class="w-20 md:w-64 h-full relative z-20 flex flex-col justify-center items-end py-12 pr-0 bg-black/20 md:bg-transparent backdrop-blur-sm md:backdrop-blur-none border-l border-white/5 md:border-none">
    
    <!-- Vertical Line connecting tabs -->
    <div class="absolute right-[27px] md:right-[23px] top-0 bottom-0 w-[1px] bg-ww-border/50 -z-10"></div>

    <div class="flex flex-col gap-3 md:gap-4 w-full pl-2 md:pl-16">
      
      <!-- Nav Item 1 -->
      <a routerLink="/main/profile" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}"
         aria-label="Open profile"
         class="clip-slant-tab w-full flex items-center justify-end px-3 md:px-4 py-3 md:py-4 bg-transparent text-ww-muted cursor-pointer group">
        <span class="block md:hidden font-bold tracking-widest uppercase text-[9px] mr-2 group-[.active]:text-ww-bg">Info</span>
        <span class="hidden md:block font-bold tracking-widest uppercase text-sm mr-4 group-[.active]:text-ww-bg">Info</span>
        <div class="w-2 h-2 rotate-45 border border-current group-[.active]:bg-ww-bg"></div>
      </a>

      <!-- Nav Item 2 -->
      <a routerLink="/main/skills" routerLinkActive="active" 
         aria-label="Open attributes"
         class="clip-slant-tab w-full flex items-center justify-end px-3 md:px-4 py-3 md:py-4 bg-transparent text-ww-muted cursor-pointer group">
        <span class="block md:hidden font-bold tracking-widest uppercase text-[9px] mr-2 group-[.active]:text-ww-bg">Attr</span>
        <span class="hidden md:block font-bold tracking-widest uppercase text-sm mr-4 group-[.active]:text-ww-bg">Attributes</span>
        <div class="w-2 h-2 rotate-45 border border-current group-[.active]:bg-ww-bg"></div>
      </a>

      <!-- Nav Item 3 -->
      <a routerLink="/main/inventory" routerLinkActive="active" 
         aria-label="Open echoes"
         class="clip-slant-tab w-full flex items-center justify-end px-3 md:px-4 py-3 md:py-4 bg-transparent text-ww-muted cursor-pointer group">
        <span class="block md:hidden font-bold tracking-widest uppercase text-[9px] mr-2 group-[.active]:text-ww-bg">Echo</span>
        <span class="hidden md:block font-bold tracking-widest uppercase text-sm mr-4 group-[.active]:text-ww-bg">Echoes</span>
        <div class="w-2 h-2 rotate-45 border border-current group-[.active]:bg-ww-bg"></div>
      </a>

      <!-- Nav Item 4 -->
      <a routerLink="/main/travels" routerLinkActive="active" 
         aria-label="Open travel map"
         class="clip-slant-tab w-full flex items-center justify-end px-3 md:px-4 py-3 md:py-4 bg-transparent text-ww-muted cursor-pointer group">
        <span class="block md:hidden font-bold tracking-widest uppercase text-[9px] mr-2 group-[.active]:text-ww-bg">Map</span>
        <span class="hidden md:block font-bold tracking-widest uppercase text-sm mr-4 group-[.active]:text-ww-bg">World Map</span>
        <div class="w-2 h-2 rotate-45 border border-current group-[.active]:bg-ww-bg"></div>
      </a>

      <!-- Nav Item 5 -->
      <a routerLink="/main/games" routerLinkActive="active" 
         aria-label="Open games"
         class="clip-slant-tab w-full flex items-center justify-end px-3 md:px-4 py-3 md:py-4 bg-transparent text-ww-muted cursor-pointer group">
        <span class="block md:hidden font-bold tracking-widest uppercase text-[9px] mr-2 group-[.active]:text-ww-bg">Game</span>
        <span class="hidden md:block font-bold tracking-widest uppercase text-sm mr-4 group-[.active]:text-ww-bg">Games</span>
        <div class="w-2 h-2 rotate-45 border border-current group-[.active]:bg-ww-bg"></div>
      </a>

      <!-- Nav Item 6 -->
      <a routerLink="/main/archives" routerLinkActive="active" 
         aria-label="Open data bank"
         class="clip-slant-tab w-full flex items-center justify-end px-3 md:px-4 py-3 md:py-4 bg-transparent text-ww-muted cursor-pointer group">
        <span class="block md:hidden font-bold tracking-widest uppercase text-[9px] mr-2 group-[.active]:text-ww-bg">Data</span>
        <span class="hidden md:block font-bold tracking-widest uppercase text-sm mr-4 group-[.active]:text-ww-bg">Data Bank</span>
        <div class="w-2 h-2 rotate-45 border border-current group-[.active]:bg-ww-bg"></div>
      </a>

      <!-- Nav Item 7 -->
      <a routerLink="/main/contacts" routerLinkActive="active" 
         aria-label="Open comms"
         class="clip-slant-tab w-full flex items-center justify-end px-3 md:px-4 py-3 md:py-4 bg-transparent text-ww-muted cursor-pointer group">
        <span class="block md:hidden font-bold tracking-widest uppercase text-[9px] mr-2 group-[.active]:text-ww-bg">Com</span>
        <span class="hidden md:block font-bold tracking-widest uppercase text-sm mr-4 group-[.active]:text-ww-bg">Comms</span>
        <div class="w-2 h-2 rotate-45 border border-current group-[.active]:bg-ww-bg"></div>
      </a>

    </div>

    <!-- Exit Button at bottom -->
    <div class="absolute bottom-8 right-0 pr-4 md:pr-8">
      <button routerLink="/" class="flex items-center gap-2 text-ww-muted hover:text-ww-accent transition-colors">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
        <span class="hidden md:block font-mono text-xs uppercase tracking-widest">Logout</span>
      </button>
    </div>
  </nav>

</div>
