<div class="h-full flex flex-col relative max-w-5xl py-8 md:py-0">
  
  <div class="absolute -top-10 -right-10 text-[6rem] md:text-[8rem] font-bold text-white/[0.03] select-none pointer-events-none z-[-1] leading-none uppercase text-right">
    ARCHIVES
  </div>

  <div class="mb-8 md:mb-12 flex flex-col md:flex-row md:items-baseline gap-2 md:gap-6">
    <h1 class="text-4xl md:text-7xl font-bold tracking-widest uppercase text-white">Data Bank</h1>
    <span class="text-ww-accent font-mono text-xs md:text-sm tracking-mega">[ RECORDS & LICENSES ]</span>
  </div>

  <div class="flex flex-col lg:flex-row gap-8 lg:gap-12 overflow-y-auto pb-12 pr-4 custom-scrollbar">
    
    <!-- Certifications Section -->
    <div class="flex-1">
      <h2 class="text-white font-bold tracking-widest uppercase mb-4 md:mb-6 flex items-center gap-3">
        <div class="w-1.5 h-1.5 bg-ww-cyan rotate-45"></div>
        Licenses / Certifications
      </h2>

      <div class="flex flex-col gap-3 md:gap-4">
        <div *ngFor="let cert of certifications" class="clip-slant-tab ww-glass p-4 md:p-5 border-l-2 border-l-ww-cyan/50 hover:border-l-ww-cyan transition-colors group cursor-default">
          <div class="flex justify-between items-start mb-2">
            <span class="text-ww-cyan font-mono text-[8px] md:text-[10px] tracking-widest uppercase">{{ cert.id }}</span>
            <span class="text-ww-muted font-mono text-[8px] md:text-[10px] tracking-widest uppercase">{{ cert.date }}</span>
          </div>
          <h3 class="text-white font-bold text-xs md:text-sm tracking-wider uppercase mb-1">{{ cert.title }}</h3>
          <p class="text-ww-muted font-mono text-[10px] uppercase tracking-widest">{{ cert.issuer }}</p>
        </div>
      </div>
    </div>

    <!-- Education Section -->
    <div class="flex-1">
      <h2 class="text-white font-bold tracking-widest uppercase mb-4 md:mb-6 flex items-center gap-3">
        <div class="w-1.5 h-1.5 bg-purple-400 rotate-45"></div>
        Academy Records
      </h2>

      <div class="flex flex-col gap-3 md:gap-4">
        <div *ngFor="let edu of education" class="clip-slant-tab ww-glass p-4 md:p-5 border-l-2 border-l-purple-400/50 hover:border-l-purple-400 transition-colors group cursor-default">
          <div class="flex justify-between items-start mb-2">
            <span class="text-purple-400 font-mono text-[8px] md:text-[10px] tracking-widest uppercase">EDU_LOG</span>
            <span class="text-ww-muted font-mono text-[8px] md:text-[10px] tracking-widest uppercase">{{ edu.period }}</span>
          </div>
          <h3 class="text-white font-bold text-xs md:text-sm tracking-wider uppercase mb-1">{{ edu.degree }}</h3>
          <p class="text-ww-muted font-sans text-xs md:text-sm mb-2">{{ edu.institution }}</p>
          <div class="flex items-center gap-2">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" class="w-3 h-3 text-ww-muted"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
            <span class="text-ww-muted font-mono text-[8px] md:text-[10px] uppercase tracking-widest">{{ edu.location }}</span>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>
