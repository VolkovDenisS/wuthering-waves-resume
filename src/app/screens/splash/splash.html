<div #splashContainer class="relative w-full h-[100dvh] flex flex-col items-center justify-center bg-ww-bg text-ww-text cursor-pointer overflow-hidden" (click)="startGame()">
  
  <!-- Background Layers -->
  <div class="absolute inset-0 ww-resonance-bg ww-resonance-bg--splash"></div>
  <div class="absolute inset-0 bg-gradient-to-t from-ww-bg via-black/45 to-transparent"></div>
  <div class="absolute inset-0 scanlines pointer-events-none opacity-50 z-50"></div>

  <!-- Decorative HUD Elements -->
  <div class="absolute top-8 left-8 flex items-center gap-2 opacity-50">
    <div class="w-1.5 h-1.5 bg-violet-400 rotate-45"></div>
    <span class="font-mono text-[10px] tracking-widest uppercase">SYS.INIT v1.0.4</span>
  </div>
  <div class="absolute bottom-8 right-8 flex items-center gap-2 opacity-50">
    <span class="font-mono text-[10px] tracking-widest uppercase">AWAITING RESONANCE</span>
    <div class="w-1.5 h-1.5 bg-emerald-400 rotate-45"></div>
  </div>

  <!-- Content -->
  <div class="z-10 flex flex-col items-center text-center mt-[-5vh] md:mt-[-10vh] px-6">
    
    <div class="w-12 h-12 md:w-16 md:h-16 mb-6 md:mb-8 relative flex items-center justify-center drop-shadow-[0_0_24px_rgba(167,139,250,0.45)]">
      <div class="absolute inset-0 rotate-45 border-2 border-violet-400/35 animate-[spin_10s_linear_infinite]"></div>
      <div class="absolute inset-2 rotate-[-45deg] border border-emerald-400/30 animate-[spin_8s_linear_infinite_reverse]"></div>
      <div class="w-2 h-2 bg-white rotate-45 shadow-[0_0_10px_#fff]"></div>
    </div>

    <h1 class="splash-glitch text-4xl md:text-8xl font-sans font-bold tracking-widest uppercase mb-2 text-transparent bg-clip-text bg-gradient-to-b from-white to-white/50 glitch-effect" data-text="DENIS VOLKOV">
      DENIS VOLKOV
    </h1>
    <h2 class="text-emerald-300/80 font-mono text-[10px] md:text-sm tracking-[0.3em] md:tracking-[0.5em] uppercase mb-12 md:mb-16">
      Resonator Profile
    </h2>
    
    <div #startText class="flex flex-col items-center animate-pulse">
      <p class="text-xs md:text-sm tracking-[0.3em] font-mono text-violet-300 uppercase mb-2 drop-shadow-[0_0_8px_rgba(167,139,250,0.55)]">
        Click to Start
      </p>
      <div class="w-px h-8 md:h-12 bg-gradient-to-b from-violet-300 via-emerald-300/50 to-transparent"></div>
    </div>
  </div>
  
  <!-- Overlay for transition -->
  <div #transitionOverlay class="absolute inset-0 bg-white z-50 pointer-events-none opacity-0 mix-blend-overlay"></div>
</div>
