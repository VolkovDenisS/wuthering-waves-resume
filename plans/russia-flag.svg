<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="100%" height="100%">
  <!-- Закругленные углы для соответствия современному "игровому" UI -->
  <clipPath id="round-corners">
    <rect width="900" height="600" rx="60" ry="60" />
  </clipPath>
  <g clip-path="url(#round-corners)">
    <rect fill="#FFFFFF" width="900" height="200"/>
    <rect fill="#0039A6" y="200" width="900" height="200"/>
    <rect fill="#D52B1E" y="400" width="900" height="200"/>
  </g>
</svg>